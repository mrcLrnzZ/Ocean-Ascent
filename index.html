<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Ascent</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/hud.css">
    <link rel="stylesheet" href="css/ui-elements.css">
    <link rel="stylesheet" href="css/popups.css">
    <link rel="stylesheet" href="css/radio.css">
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="stylesheet" href="css/gameover.css">
    <link rel="stylesheet" href="css/almanac.css">
    <link rel="stylesheet" href="css/tutorial.css">
    <link rel="stylesheet" href="css/cheatbox.css">
</head>

<body>
    <!-- Homepage with Parallax -->
    <div id="homepage" class="homepage-container">

        <!-- Parallax Background Layers -->
        <div class="parallax-layer layer-0" style="background-image: url('assets/0_ocean_sky_and_sun.png');"></div>
        <div class="parallax-layer layer-mountains" style="background-image: url('assets/4_ocean_back_mountain.png');">
        </div>
        <div class="parallax-layer layer-clouds" style="background-image: url('assets/3_ocean_clouds.png');"></div>
        <div class="parallax-layer layer-sea" style="background-image: url('assets/1_ocean_sea.png');"></div>

        <!-- Boat and Fisherman -->
        <div class="home-boat-container">
            <img src="assets/boatlvl1.png" class="home-boat" alt="Level 1 Boat">
            <div class="home-fisherman">
                <img src="assets/Fishermanred_idlev2.png" class="fisherman-sprite" alt="Fisherman">
            </div>
        </div>

        <!-- Gentle Water Waves Overlay for immersion -->
        <div class="water-waves"></div>

        <!-- Weather Effects -->
        <canvas id="rain-canvas" class="weather-effects"></canvas>
        <div id="lightning-overlay" class="lightning-overlay"></div>

        <!-- Homepage Content -->
        <div class="homepage-content">
            <h1 class="game-title" data-text="OCEAN ASCENT">
                <span>O</span><span>C</span><span>E</span><span>A</span><span>N</span>
                <span>A</span><span>S</span><span>C</span><span>E</span><span>N</span><span>T</span>
            </h1>
            <div class="menu-buttons">
                <button id="startBtn" class="menu-button">[ PLAY ]</button>
            </div>
        </div>

        <!-- Floating particles -->
        <div class="particles"></div>
    </div>

    <video id="introVideo" width="100%" height="100%"
        style="display:none; position:fixed; top:0; left:0; z-index:100; object-fit:cover;">
        <source src="assets/intro.mp4" type="video/mp4">
    </video>
    <video id="endingVideo" width="100%" height="100%"
        style="display:none; position:fixed; top:0; left:0; z-index:100; object-fit:cover;">
        <source src="assets/endingscene.mp4" type="video/mp4">
    </video>
    <canvas id="gameCanvas"></canvas>

    <div id="overlay" style="display: none;">
        <div id="hud-stats-v2">
            <div class="stat-bar-item coin-item">
                <span id="h-money" class="stat-value">$0</span>
            </div>
            <div class="stat-bar-item plain-item">
                <span id="h-rod" class="stat-value">Bamboo Rod</span>
            </div>
            <div class="stat-bar-item plain-item">
                <span id="h-boat" class="stat-value">None</span>
            </div>

        </div>



        <button id="almanac-btn"> Almanac </button>
        <button id="bag-btn" onclick="openBag()"> Bag </button>
        <button id="mechanics-btn" onclick="openMechanics()">Mechanics</button>
        <button id="tutorial-btn" onclick="openTutorial()">How to Play</button>
        <!-- Radio UI moved -->




        <div id="power-wrap">
            <div class="lbl">PWR</div>
            <div id="power-bar">
                <div id="power-fill" style="height:0%"></div>
            </div>
        </div>

        <div id="depth-wrap">
            <div class="lbl">DEPTH</div>
            <div id="depth-bar">
                <div id="depth-fill" style="height:0%"></div>
            </div>
            <div id="depth-val">0m</div>
        </div>

        <div id="reel-wrap">
            <div id="reel-label">Fish on! Mash SPACE!</div>
            <div id="reel-bar-bg">
                <div id="reel-fill" style="width:100%"></div>
            </div>
        </div>

        <!-- <button id="debug-btn"
            style="position:absolute; top: 5px; right: 350px; z-index: 1000; padding: 5px; cursor: pointer;">Debug Cam:
            OFF</button>
               <button id="complete-btn"
            style="position:absolute; top: 5px; right: 250px; z-index: 1000; padding: 5px; cursor: pointer;">Complete
            Game</button> -->

        <!-- Weather Control Panel -->
        <!-- <div id="weather-controls" style="position:absolute; top: 50px; right: 10px; z-index: 1000; background: rgba(8,4,18,0.92); padding: 12px 14px; border-radius: 8px; color: #dde; font-size: 12px; min-width: 220px; border: 1px solid rgba(100,130,200,0.25);">
            <div style="font-weight:bold; margin-bottom:7px; font-size:13px; letter-spacing:0.5px;">🌤 Weather Controls</div>

            <div style="display:flex; flex-wrap:wrap; gap:3px; margin-bottom:8px;">
                <button onclick="window.setWeather('clear')"  style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#1a3a5a; border:1px solid #3a7aaa; color:#cce; border-radius:4px;">☀ Clear</button>
                <button onclick="window.setWeather('rainy')"  style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#1a2a3a; border:1px solid #4a6a8a; color:#cce; border-radius:4px;">🌧 Rainy</button>
                <button onclick="window.setWeather('stormy')" style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#1a1a2a; border:1px solid #4a4a7a; color:#cce; border-radius:4px;">⛈ Stormy</button>
                <button onclick="window.setWeather('foggy')"  style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#2a3040; border:1px solid #6a7888; color:#cce; border-radius:4px;">🌫 Foggy</button>
            </div>


        </div> -->
        <div id="sea-depth-meter"
            style="position:absolute; left: 50%; transform: translateX(-50%); bottom: 50px;  color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 1000; display: none;">
            Sea Depth: 0m</div>
        <div id="notif"></div>
        <div id="level-notif"></div>
        <div id="popup"></div>
        <div id="cheatbox">
            <div id="cheatbox-label">System Terminal</div>
            <input type="text" id="cheat-input" placeholder="ENTER CHEAT CODE..." autocomplete="off">
        </div>

        <!-- Survival HUD: Health + Hunger (Minecraft-style icon rows) -->
        <div id="survival-hud">
            <div class="survival-row" id="health-icons"></div>
            <div class="survival-row" id="hunger-icons"></div>
        </div>

        <!-- Starvation Warning Overlay -->
        <div id="starvation-warning">
            <div id="starvation-warning-inner">
                STARVING! Eat a fish!
            </div>
        </div>


        <!-- Bag / Inventory Popup -->
        <div id="bag-popup">
            <div id="bag-popup-inner">
                <!-- 3x2 Grid (6 slots) -->
                <div id="new-bag-grid">
                    <div class="inv-slot" data-index="0"></div>
                    <div class="inv-slot" data-index="1"></div>
                    <div class="inv-slot" data-index="2"></div>
                    <div class="inv-slot" data-index="3"></div>
                    <div class="inv-slot" data-index="4"></div>
                    <div class="inv-slot" data-index="5"></div>
                </div>

                <!-- Bag Control -->
                <div id="bag-footer">
                    <button id="bag-close-btn" onclick="closeBag()">✖</button>
                </div>

                <!-- Eat/Sell Options Panel (Positioned below inventory) -->
                <div id="eat-sell-panel" style="display: none;">
                    <img src="assets/eatselloption.png" id="eat-sell-bg" alt="Options">
                    <div class="eat-sell-buttons">
                        <button id="eat-btn">Eat</button>
                        <button id="sell-btn">Sell</button>
                    </div>
                    <!-- Wooden-style info panel below buttons -->
                    <div id="fish-info-panel">
                        <div id="info-hunger">+0 Hunger</div>
                        <div id="info-coins">+0 Coins</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Almanac UI -->
        <div id="almanac-popup" class="almanac-container" style="display: none;">
            <div class="almanac-header">
                <h2>Almanac</h2>
                <button onclick="closeAlmanacUI()" class="close-btn">✖</button>
            </div>

            <div id="almanac-book">
                <div class="page-wrapper">
                    <div id="left-page" class="almanac-page"></div>
                </div>

                <div class="page-wrapper">
                    <div id="right-page" class="almanac-page"></div>
                </div>
            </div>

            <div class="almanac-footer">
                <button onclick="changeAlmanacPage(-1)" class="page-btn">◀ Prev</button>
                <span id="almanac-page-num">1 / 5</span>
                <button onclick="changeAlmanacPage(1)" class="page-btn">Next ▶</button>
            </div>
        </div>


        <!-- tutorial -->
        <div id="tutorial-popup" class="almanac-container" style="display:none;">
            <div class="almanac-header">
                <h2>How to Play</h2>
                <button onclick="closeTutorial()" class="close-btn">✖</button>
            </div>
            <div id="tutorial-book">
                <div class="page-wrapper">
                    <div id="tutorial-left" class="almanac-page tut-page"></div>
                </div>
                <div class="page-wrapper">
                    <div id="tutorial-right" class="almanac-page tut-page"></div>
                </div>
            </div>
            <div class="almanac-footer">
                <button id="tut-btn-prev" class="page-btn" onclick="changeTutorialPage(-1)">◀ Prev</button>
                <span id="tutorial-page-num">1 / 4</span>
                <button id="tut-btn-next" class="page-btn" onclick="changeTutorialPage(1)">Next ▶</button>
            </div>
        </div>


        <div id="mechanics-popup" class="almanac-container" style="display:none;">

            <div class="almanac-header">
                <h2>Mechanics</h2>
                <button onclick="closeMechanics()" class="close-btn">✖</button>
            </div>

            <div id="mechanics-book">
                <div class="page-wrapper">
                    <div id="mechanics-left" class="almanac-page tut-page"></div>
                </div>
                <div class="page-wrapper">
                    <div id="mechanics-right" class="almanac-page tut-page"></div>
                </div>
            </div>

            <div class="almanac-footer">
                <button id="mech-btn-prev" class="page-btn" onclick="changeMechanicsPage(-1)">◀ Prev</button>
                <span id="mechanics-page-num">1 / 3</span>
                <button id="mech-btn-next" class="page-btn" onclick="changeMechanicsPage(1)">Next ▶</button>
            </div>

        </div>



        <!-- First Catch Popup -->
        <div id="first-catch-popup" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, rgba(202, 108, 0, 0.95), rgba(216, 122, 0, 0.95)); border: 0.3vw solid #da8d00; border-radius: 2vw; padding: 3vh 4vw; color: white; width: 45vw; text-align: center; font-family: 'upheaval', cursive; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto;">
            <div id="fc-screenshot-area" style="background: rgba(0,0,0,0.3); border-radius: 1vw; padding: 2vh 2vw; margin-bottom: 2vh; border: 0.1vw solid rgba(255,255,255,0.2); width: 100%; display: flex; flex-direction: column; align-items: center;">
                <h2 style="color: #FFD700; font-size: 2.5vw; margin-top: 0; margin-bottom: 2vh; text-shadow: 2px 2px #000; font-family: 'upheaval', cursive;">Congrats! You caught</h2>
                <img id="fc-image" src="" alt="Fish Image" style="max-width: 20vw; max-height: 20vh; object-fit: contain; image-rendering: pixelated; margin-bottom: 1.5vh; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));">
                <div id="fc-name" style="font-size: 2.5vw; color: #FFF; text-shadow: 2px 2px #000; font-family: 'upheaval', cursive;">[Fish Name]</div>
            </div>
            <div style="display: flex; gap: 2vw; justify-content: center; width: 100%;">
                <button id="fc-capture-btn" onclick="captureFirstCatch(event)" style="background: linear-gradient(135deg, #FFD700, #DAA520); color: black; font-family: 'upheaval', cursive; border: 0.15vw solid #FFF; padding: 1vh 2vw; font-size: 1.5vw; border-radius: 1vw; cursor: pointer; text-shadow: 1px 1px rgb(255, 238, 0);">Capture</button>
                <button onclick="closeFirstCatchUI()" style="background: linear-gradient(135deg, rgba(200, 50, 50, 0.9), rgba(150, 30, 30, 0.9)); color: white; font-family: 'upheaval', cursive; border: 0.15vw solid #ad0000; padding: 1vh 2vw; font-size: 1.5vw; border-radius: 1vw; cursor: pointer; text-shadow: 1px 1px #000;">Awesome!</button>
            </div>
        </div>

        <!-- You Starved! Game Over Screen -->
        <div id="gameover-screen">
            <div id="gameover-inner">
                <img src="assets/gameover.png" id="gameover-img" alt="Game Over">
                <div id="gameover-stats">
                    <span id="gameover-money"></span>
                    <span id="gameover-fish"></span>
                </div>
                <div id="gameover-buttons">
                    <button id="gameover-home-btn" onclick="gameHome()">Back to Home</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Radio Toggle Button: direct body child so position:fixed resolves to viewport -->
    <button id="radio-toggle-btn" style="display:none;">Radio</button>

    <!-- Radio container: same reason, must NOT be inside #overlay (which has transform) -->
    <div id="radio-container">
        <div class="radio-screen">
            <div class="scrolling-text-container">
                <span id="song-name">Now Playing: Coastal Breeze</span>
            </div>
        </div>
        <img src="assets/radio.png" id="radio-img" alt="Radio">
        <div class="radio-controls">
            <button id="radio-prev" class="radio-btn">◀</button>
            <button id="radio-play-pause" class="radio-btn">⏸</button>
            <button id="radio-next" class="radio-btn">▶</button>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
