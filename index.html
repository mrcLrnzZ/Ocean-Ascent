<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Ascent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="overlay">

        <div id="hud-left">
            <span class="lbl">Money</span> <span class="val" id="h-money">$0</span><br>
            <span class="lbl">Rod</span> <span class="val" id="h-rod">Bamboo Rod</span><br>
            <span class="lbl">Boat</span> <span class="val" id="h-boat">None</span><br>
            <span class="lbl">Catch</span> <span class="val" id="h-catch">0 fish</span>
        </div>

        <div id="hud-right">
            <span id="h-wx">☀ Sunny</span><br>
            <span id="h-wind">Wind: 0mph</span><br>
            <span id="h-wave">Waves: Calm</span>
        </div>

        <button id="almanac-btn">📖 Almanac</button>
        <button id="fs-btn" title="Toggle Fullscreen">⛶</button>

        <div id="power-wrap">
            <div class="lbl">PWR</div>
            <div id="power-bar">
                <div id="power-fill" style="height:0%"></div>
            </div>
        </div>

        <div id="depth-wrap">
            <div class="lbl">DEPTH</div>
            <div id="depth-bar">
                <div id="depth-fill" style="height:0%"></div>
            </div>
            <div id="depth-val">0m</div>
        </div>

        <div id="reel-wrap">
            <div id="reel-label">🎣 Fish on! Mash SPACE!</div>
            <div id="reel-bar-bg">
                <div id="reel-fill" style="width:100%"></div>
            </div>
        </div>

        <div id="ctrl-bar"></div>
        <button id="debug-btn"
            style="position:absolute; top: 10px; right: 80px; z-index: 1000; padding: 5px; cursor: pointer;">Debug Cam:
            OFF</button>

        <!-- Weather Control Panel -->
        <div id="weather-controls" style="position:absolute; top: 50px; right: 10px; z-index: 1000; background: rgba(10, 5, 20, 0.85); padding: 10px; border-radius: 5px; color: white; font-size: 12px;">
            <div style="font-weight: bold; margin-bottom: 5px;">🌤 Weather Controls</div>
            <button onclick="window.setWeather('clear')" style="margin: 2px; padding: 3px 8px; cursor: pointer;">☀ Clear</button>
            <button onclick="window.setWeather('cloudy')" style="margin: 2px; padding: 3px 8px; cursor: pointer;">☁ Cloudy</button>
            <button onclick="window.setWeather('rainy')" style="margin: 2px; padding: 3px 8px; cursor: pointer;">🌧 Rainy</button>
            <button onclick="window.setWeather('stormy')" style="margin: 2px; padding: 3px 8px; cursor: pointer;">⛈ Stormy</button>
            <button onclick="window.setWeather('foggy')" style="margin: 2px; padding: 3px 8px; cursor: pointer;">🌫 Foggy</button>
            <div style="margin-top: 5px; font-size: 11px;">Current: <span id="current-weather">Clear</span></div>
        </div>
        <div id="sea-depth-meter"
            style="position:absolute; bottom: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 1000; display: none;">
            Sea Depth: 0m</div>
        <div id="notif"></div>
        <div id="popup"></div>

        <!-- Almanac UI -->
        <div id="almanac-popup" class="almanac-container" style="display: none;">
            <div class="almanac-header">
                <h2>Almanac</h2>
                <button onclick="closeAlmanacUI()" class="close-btn">✖</button>
            </div>

            <!-- Items rendered here by JS -->
            <div id="almanac-grid" class="almanac-grid"></div>

            <div class="almanac-footer">
                <button onclick="changeAlmanacPage(-1)" class="page-btn">◀ Prev</button>
                <span id="almanac-page-num">1 / 5</span>
                <button onclick="changeAlmanacPage(1)" class="page-btn">Next ▶</button>
            </div>
        </div>

        <div id="zone-warn">
            <h3>⚠ Danger Zone!</h3>
            <p id="zone-warn-msg"></p>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
