<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Ascent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Homepage with Parallax -->
    <div id="homepage" class="homepage-container">
       
        <div class="mountain" style="background-image: url('assets/sky_front_mountain.png');"></div>
        <div class="ocean" style="background-image: url('assets/parallax_seav2.png');"></div>
        <div class="sky" style="background-image: url('assets/sky_clouds.png');"></div>
        <div class="backmountain" style="background-image: url('assets/sky_back_mountain.png');"></div>

        <!-- Weather Effects -->
        <canvas id="rain-canvas" class="weather-effects"></canvas>
        <div id="lightning-overlay" class="lightning-overlay"></div>

        <!-- Homepage Content -->
        <div class="homepage-content">
            <h1 class="game-title">Ocean Ascent</h1>
            <button id="start-btn" class="start-button">START FISHING</button>
        </div>

        <!-- Floating particles -->
        <div class="particles"></div>
    </div>

    <video id="introVideo" width="100%" height="100%" style="display:none; position:fixed; top:0; left:0; z-index:100; object-fit:cover;">
        <source src="assets/intro.mp4" type="video/mp4">
    </video>
    <canvas id="gameCanvas"></canvas>

    <div id="overlay">

        <div id="hud-left">
            <span class="lbl">Money</span> <span class="val" id="h-money">$0</span><br>
            <span class="lbl">Rod</span> <span class="val" id="h-rod">Bamboo Rod</span><br>
            <span class="lbl">Boat</span> <span class="val" id="h-boat">None</span><br>
            <span class="lbl">Catch</span> <span class="val" id="h-catch">0 fish</span>
        </div>

        <div id="hud-right">
            <span id="h-wx">☀ Sunny</span><br>
            <span id="h-wind">Wind: 0mph</span><br>
            <span id="h-wave">Waves: Calm</span>
        </div>

        <button id="almanac-btn">📖 Almanac</button>
        <button id="fs-btn" title="Toggle Fullscreen">⛶</button>

        <div id="power-wrap">
            <div class="lbl">PWR</div>
            <div id="power-bar">
                <div id="power-fill" style="height:0%"></div>
            </div>
        </div>

        <div id="depth-wrap">
            <div class="lbl">DEPTH</div>
            <div id="depth-bar">
                <div id="depth-fill" style="height:0%"></div>
            </div>
            <div id="depth-val">0m</div>
        </div>

        <div id="reel-wrap">
            <div id="reel-label">🎣 Fish on! Mash SPACE!</div>
            <div id="reel-bar-bg">
                <div id="reel-fill" style="width:100%"></div>
            </div>
        </div>

        <div id="ctrl-bar"></div>
        <button id="debug-btn"
            style="position:absolute; top: 10px; right: 80px; z-index: 1000; padding: 5px; cursor: pointer;">Debug Cam:
            OFF</button>

        <!-- Weather Control Panel -->
        <div id="weather-controls" style="position:absolute; top: 50px; right: 10px; z-index: 1000; background: rgba(8,4,18,0.92); padding: 12px 14px; border-radius: 8px; color: #dde; font-size: 12px; min-width: 220px; border: 1px solid rgba(100,130,200,0.25);">
            <div style="font-weight:bold; margin-bottom:7px; font-size:13px; letter-spacing:0.5px;">🌤 Weather Controls</div>

            <!-- Quick-set buttons -->
            <div style="display:flex; flex-wrap:wrap; gap:3px; margin-bottom:8px;">
                <button onclick="window.setWeather('clear')"  style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#1a3a5a; border:1px solid #3a7aaa; color:#cce; border-radius:4px;">☀ Clear</button>
                <button onclick="window.setWeather('rainy')"  style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#1a2a3a; border:1px solid #4a6a8a; color:#cce; border-radius:4px;">🌧 Rainy</button>
                <button onclick="window.setWeather('stormy')" style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#1a1a2a; border:1px solid #4a4a7a; color:#cce; border-radius:4px;">⛈ Stormy</button>
                <button onclick="window.setWeather('foggy')"  style="flex:1; min-width:60px; padding:3px 6px; cursor:pointer; background:#2a3040; border:1px solid #6a7888; color:#cce; border-radius:4px;">🌫 Foggy</button>
            </div>

          
        </div>
        <div id="sea-depth-meter"
            style="position:absolute; bottom: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 1000; display: none;">
            Sea Depth: 0m</div>
        <div id="notif"></div>
        <div id="popup"></div>

        <!-- Almanac UI -->
        <div id="almanac-popup" class="almanac-container" style="display: none;">
            <div class="almanac-header">
                <h2>Almanac</h2>
                <button onclick="closeAlmanacUI()" class="close-btn">✖</button>
            </div>

            <!-- Items rendered here by JS -->
            <div id="almanac-grid" class="almanac-grid"></div>

            <div class="almanac-footer">
                <button onclick="changeAlmanacPage(-1)" class="page-btn">◀ Prev</button>
                <span id="almanac-page-num">1 / 5</span>
                <button onclick="changeAlmanacPage(1)" class="page-btn">Next ▶</button>
            </div>
        </div>

        <div id="zone-warn">
            <h3>⚠ Danger Zone!</h3>
            <p id="zone-warn-msg"></p>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
